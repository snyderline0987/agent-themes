<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="400" viewBox="0 0 1200 400"
     role="img" aria-labelledby="title desc">
  <title id="title">Agent Themes</title>
  <desc id="desc">Type any fictional universe and get a deployable AI agent team, shown here as the app's org chart: Danny Ocean leading Rusty Ryan and Linus Caldwell.</desc>

  <!-- Canvas -->
  <rect width="1200" height="400" rx="26" fill="#0a0a0a"/>
  <rect x="0.5" y="0.5" width="1199" height="399" rx="25.5" fill="none" stroke="#222222"/>

  <!-- ─── Title block ─────────────────────────────────── -->
  <g id="title-block" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <text x="64" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" letter-spacing="3" fill="#e50914">FICTIONAL UNIVERSE &#8594; AI AGENT TEAM</text>

    <text x="64" y="158" font-size="58" font-weight="700" fill="#f0f0f0">Agent Themes</text>

    <text x="64" y="200" font-size="20" fill="#999999">Type any movie, series, or game universe. Get a working</text>
    <text x="64" y="228" font-size="20" fill="#999999">agent team &#8212; cast, ranked, and ready to deploy.</text>

    <!-- Input + button, mirroring the app's real form -->
    <g id="theme-form">
      <rect x="64" y="256" width="330" height="54" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
      <text x="86" y="290" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#f0f0f0">Ocean's Eleven</text>
      <rect x="232" y="268" width="2" height="30" fill="#e50914"/>
      <rect x="410" y="256" width="182" height="54" rx="8" fill="#e50914"/>
      <text x="501" y="290" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">Generate Team</text>
    </g>

    <text x="64" y="356" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" letter-spacing="1" fill="#666666">EXPRESS &#183; VANILLA JS &#183; 5 PRE-BUILT THEMES &#183; BYO LLM KEY</text>
  </g>

  <!-- ─── Org-tree proof (the app's actual output) ────── -->
  <g id="org-tree" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">

    <!-- Connectors -->
    <path d="M 950 160 V 190 M 848 190 H 1052 M 848 190 V 220 M 1052 190 V 220"
          fill="none" stroke="#333333" stroke-width="1.5"/>

    <!-- Lead card -->
    <g id="card-lead">
      <rect x="838" y="60" width="224" height="100" rx="12" fill="#141414" stroke="#e50914" stroke-width="1.5"/>
      <rect x="925" y="52" width="50" height="17" rx="8.5" fill="#e50914"/>
      <text x="950" y="64.5" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1.5" fill="#ffffff">LEAD</text>
      <circle cx="874" cy="110" r="19" fill="#0a0a0a" stroke="#e50914"/>
      <text x="874" y="115" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#f0f0f0">DO</text>
      <text x="906" y="103" font-size="18" font-weight="600" fill="#f0f0f0">Danny Ocean</text>
      <text x="906" y="124" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" letter-spacing="1.5" fill="#e50914">MASTERMIND</text>
      <text x="906" y="145" font-size="13" fill="#999999">Plans the impossible</text>
    </g>

    <!-- Report card A -->
    <g id="card-rusty">
      <rect x="746" y="220" width="204" height="96" rx="12" fill="#141414" stroke="#222222"/>
      <circle cx="780" cy="268" r="17" fill="#0a0a0a" stroke="#444444"/>
      <text x="780" y="273" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#f0f0f0">RR</text>
      <text x="810" y="261" font-size="16" font-weight="600" fill="#f0f0f0">Rusty Ryan</text>
      <text x="810" y="281" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11.5" letter-spacing="1.5" fill="#e50914">OPERATIONS</text>
      <text x="810" y="300" font-size="12.5" fill="#999999">The reliable right hand</text>
    </g>

    <!-- Report card B -->
    <g id="card-linus">
      <rect x="962" y="220" width="190" height="96" rx="12" fill="#141414" stroke="#222222"/>
      <circle cx="996" cy="268" r="17" fill="#0a0a0a" stroke="#444444"/>
      <text x="996" y="273" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#f0f0f0">LC</text>
      <text x="1026" y="261" font-size="16" font-weight="600" fill="#f0f0f0">Linus</text>
      <text x="1026" y="281" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11.5" letter-spacing="1.5" fill="#e50914">SPECIALIST</text>
      <text x="1026" y="300" font-size="12.5" fill="#999999">Talented newcomer</text>
    </g>

    <!-- Faded hint of a deeper hierarchy -->
    <path d="M 848 316 V 336 M 1052 316 V 336" fill="none" stroke="#222222" stroke-width="1.5"/>
    <rect x="746" y="336" width="204" height="16" rx="8" fill="#141414" opacity="0.55"/>
    <rect x="962" y="336" width="190" height="16" rx="8" fill="#141414" opacity="0.55"/>
  </g>
</svg>
